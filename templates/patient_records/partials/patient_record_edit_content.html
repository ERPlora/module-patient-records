{% load djicons i18n %}
<div data-back-url="{% url 'patient_records:patient_records_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Patientrecord" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'patient_records:patient_records_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-patient_record-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-patient_record-form"
          hx-post="{% url 'patient_records:patient_record_edit' obj.id %}" class="max-w-2xl">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Patient Name" %}</label>
                <input type="text" name="patient_name" class="input input-sm w-full" value="{{ obj.patient_name }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Date Of Birth" %}</label>
                <input type="date" name="date_of_birth" class="input input-sm w-full" value="{{ obj.date_of_birth }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Gender" %}</label>
                <input type="text" name="gender" class="input input-sm w-full" value="{{ obj.gender }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Blood Type" %}</label>
                <input type="text" name="blood_type" class="input input-sm w-full" value="{{ obj.blood_type }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Allergies" %}</label>
                <textarea name="allergies" class="textarea textarea-sm w-full" rows="3">{{ obj.allergies }}</textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Medical Notes" %}</label>
                <textarea name="medical_notes" class="textarea textarea-sm w-full" rows="3">{{ obj.medical_notes }}</textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Is Active" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="is_active" {% if obj.is_active %}checked{% endif %}>
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>
            </div>
        </div>
    </form>
</div>
